version: "3.7" 
services:
  nginx_melomandas: 
    image: nginx:stable-alpine 
    container_name: nginx_melomandas
    ports:
      - 8082:80
    volumes:
      - ./src:/var/www/html 
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf 
    depends_on: 
      - php_melomandas
      - mysql_melomandas
    networks: 
      - laravel

  mysql_melomandas: 
    image: mysql:5.7 
    container_name: mysql_melomandas
    restart: unless-stopped 
    tty: true 
    ports: 
      - 33069:3306 
    volumes:
      - ./mysql:/var/lib/mysql 
    environment: 
      MYSQL_DATABASE: 'homestead' 
      MYSQL_USER: 'homestead'
      MYSQL_PASSWORD: 'secret'
      MYSQL_ROOT_PASSWORD: 'secret.root'
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    networks:
      - laravel 

  php_melomandas: 
    # image: php:8.2-fpm 
    # restart: unless-stopped 
    # tty: true 
    # If you want to use a custom Dockerfile, uncomment the lines below
    build: 
      context: . 
      dockerfile: Dockerfile 
    container_name: php_melomandas 
    working_dir: /var/www/html
    volumes: 
      - ./src:/var/www/html 
    ports:
      - 9003:9000 
      - 51731:5173
    networks:
      - laravel  

networks: 
  laravel:
